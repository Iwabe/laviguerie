services:
  laviguerie:
    build:
      context: .
      dockerfile: Dockerfile
    image: laviguerie:latest
    container_name: laviguerie_web
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - default
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # Remplacer par votre domaine dans Dokploy
      - "traefik.http.routers.laviguerie.rule=Host(`${DOKPLOY_DOMAIN}`)"
      - "traefik.http.routers.laviguerie.entrypoints=web"
      - "traefik.http.services.laviguerie.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  dokploy-network:
    external: true
